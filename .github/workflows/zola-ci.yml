name: Zola CI

on:
  workflow_call:
    inputs:
      enable-deploy:
        description: 'Enable deployment to GitHub Pages'
        required: false
        type: boolean
        default: false
      zola-version:
        description: 'Zola version to use'
        required: false
        type: string
        default: '0.22.1'

permissions:
  contents: read

jobs:
  build:
    name: zola build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - name: Install Zola
        run: |
          curl -sL "https://github.com/getzola/zola/releases/download/v${{ inputs.zola-version }}/zola-v${{ inputs.zola-version }}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/
      - run: zola build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public/

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: REUSE compliance check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6

  canary:
    name: canary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - reuse
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.reuse.result }}" != "success" ]]; then exit 1; fi
          echo "All checks passed!"

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    if: inputs.enable-deploy && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
