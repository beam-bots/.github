name: Elixir CI

on:
  workflow_call:
    inputs:
      enable-spark-formatter:
        description: "Run mix spark.formatter --check"
        type: boolean
        default: false
      enable-spark-cheat-sheets:
        description: "Run mix spark.cheat_sheets --check"
        type: boolean
        default: false
      enable-docs-deploy:
        description: "Deploy docs to GitHub Pages"
        type: boolean
        default: false
      enable-release:
        description: "Publish to Hex.pm on version tags"
        type: boolean
        default: true
    secrets:
      HEX_API_KEY:
        description: "Hex.pm API key for publishing"
        required: false

jobs:
  build-test:
    name: MIX_ENV=test mix compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/install-elixir@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
      - name: Set OS deps compile partition count
        run: echo "MIX_OS_DEPS_COMPILE_PARTITION_COUNT=$(($(lscpu -p | grep -v '^#' | sort -u -t, -k 2,4 | wc -l) / 2))" >> $GITHUB_ENV
      - uses: team-alembic/staple-actions/actions/mix-compile@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          args: "--warnings-as-errors"

  test:
    name: mix test
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-test@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test

  credo:
    name: mix credo --strict
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-credo@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
      - name: Run Credo SAST
        uses: team-alembic/staple-actions/actions/mix-task@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          task: credo --format sarif > results.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
          category: credo

  formatter:
    name: mix format --check-formatted
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-format@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test

  spark-formatter:
    name: mix spark.formatter --check
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ inputs.enable-spark-formatter }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-task@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          task: spark.formatter --check

  spark-cheat-sheets:
    name: mix spark.cheat_sheets --check
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ inputs.enable-spark-cheat-sheets }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-task@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          task: spark.cheat_sheets --dry-run --yes
      - uses: team-alembic/staple-actions/actions/mix-task@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          task: spark.cheat_sheets --check

  dialyzer:
    name: mix dialyzer
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-dialyzer@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test

  audit:
    name: mix deps.audit + hex.audit
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-hex-audit@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
      - uses: team-alembic/staple-actions/actions/mix-task@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          task: deps.audit

  unused-deps:
    name: mix deps.unlock --check-unused
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-task@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          task: deps.unlock --check-unused

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: REUSE compliance check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6

  build-docs:
    name: mix docs
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: team-alembic/staple-actions/actions/mix-docs@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: dev
          use-cache: false
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: doc/

  deploy-docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: canary
    if: ${{ !cancelled() && needs.canary.result == 'success' && inputs.enable-docs-deploy && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  canary:
    name: canary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - credo
      - formatter
      - spark-formatter
      - spark-cheat-sheets
      - dialyzer
      - audit
      - unused-deps
      - reuse
      - build-docs
    steps:
      - name: Check all jobs passed
        run: |
          # Required jobs must succeed
          if [[ "${{ needs.test.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.credo.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.formatter.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.dialyzer.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.audit.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.unused-deps.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.reuse.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.build-docs.result }}" != "success" ]]; then exit 1; fi
          # Optional jobs must succeed or be skipped
          if [[ "${{ needs.spark-formatter.result }}" != "success" && "${{ needs.spark-formatter.result }}" != "skipped" ]]; then exit 1; fi
          if [[ "${{ needs.spark-cheat-sheets.result }}" != "success" && "${{ needs.spark-cheat-sheets.result }}" != "skipped" ]]; then exit 1; fi
          echo "All checks passed!"

  release:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: canary
    if: ${{ !cancelled() && needs.canary.result == 'success' && inputs.enable-release && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Extract release notes from CHANGELOG.md
        id: extract-notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}

          # Extract the section for this version from CHANGELOG.md
          awk -v version="$VERSION" '
            /^## \[v?[0-9]/ {
              if (found) exit
              if (index($0, "[v" version "]") || index($0, "[" version "]")) {
                found = 1
                next
              }
            }
            found {
              if (/^## \[v?[0-9]/) exit
              print
            }
          ' CHANGELOG.md > release_notes.md

          # Check if notes were found
          if [ -s release_notes.md ]; then
            echo "has_notes=true" >> $GITHUB_OUTPUT
            echo "Release notes extracted for version $VERSION"
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
            echo "No release notes found for version $VERSION, will use auto-generated notes"
          fi
      - name: Create prerelease with changelog notes
        if: ${{ (contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --prerelease \
            --notes-file release_notes.md \
            ${GITHUB_REF#refs/tags/}
      - name: Create prerelease with generated notes
        if: ${{ (contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --prerelease \
            --generate-notes \
            ${GITHUB_REF#refs/tags/}
      - name: Create release with changelog notes
        if: ${{ (!contains(github.ref, '-rc') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --notes-file release_notes.md \
            ${GITHUB_REF#refs/tags/}
      - name: Create release with generated notes
        if: ${{ (!contains(github.ref, '-rc') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-pre')) && steps.extract-notes.outputs.has_notes != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            --repo ${{ github.repository }} \
            --title ${GITHUB_REF#refs/tags/} \
            --generate-notes \
            ${GITHUB_REF#refs/tags/}
      - uses: team-alembic/staple-actions/actions/mix-hex-publish@d8e64cbaa32c80b6cc199ec050612ec6d0e072f9 # main
        with:
          mix-env: test
          hex-api-key: ${{ secrets.HEX_API_KEY }}
